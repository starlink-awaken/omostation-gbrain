name: gbrain-audit-baseline-monthly

# R50 + E1 P0: gbrain 跨仓债审计 cron
# 目标: 跑 tools/audit.sh 检查 gbrain 仓内 AppendOnlyLog 6 写点
# 触发: 每月 1 号 02:00 UTC

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:

jobs:
  audit-baseline:
    name: audit-baseline (R50 + E1 P0 跨仓债)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run gbrain audit.sh
        run: |
          bash tools/audit.sh .
